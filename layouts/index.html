<!DOCTYPE html>
<html lang="{{ site.Language.Lang | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="{{ site.Params.brand_yellow }}">
  <title>{{ site.Title }} — Software Development</title>
  <meta name="description" content="{{ site.Params.description }}">
  <meta name="keywords" content="ZeroSharp, software development, C#, ASP.NET">

  <link rel="icon" type="image/svg+xml" href="{{ "/favicon.svg" | relURL }}">

  {{ $css := resources.Get "scss/main.scss" | toCSS (dict "outputStyle" "compressed") | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
</head>
<body class="is-landing">

  {{ partial "site-header.html" . }}

  <main class="zs-hero-wrap">
    <div class="zs-hero-content">
      <h1>0#</h1>
    </div>
  </main>

</body>
</html>
