{{ define "main" }}
<header>
  <h1 class="post-title">{{ site.Title }}</h1>
  <p class="zs-body" style="font-weight: 100; font-size: 1.125rem; line-height: 1.7; color: var(--zs-ink);">
    {{ site.Params.description }}
  </p>
</header>

<div class="entry-content">
  {{ .Content }}

  <h2 class="zs-h2" style="margin-top: 3rem;">Recent posts</h2>
  <ul class="post-list" style="list-style:none; padding:0; margin:1rem 0 0;">
    {{ range first 10 (where site.RegularPages "Section" "blog") }}
      <li style="padding: 1rem 0; border-bottom: 1px solid var(--zs-rule);">
        <h3 style="margin: 0 0 0.25rem; font-size: 1.25rem; font-family: var(--zs-font-display);">
          <a href="{{ .RelPermalink }}" style="color: var(--zs-purple); text-decoration: none;">{{ .Title }}</a>
        </h3>
        <p class="zs-meta" style="margin: 0; font-size: 0.875rem;">
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
        </p>
      </li>
    {{ end }}
  </ul>
  <p style="margin-top: 1.25rem;"><a href="{{ "/blog/" | relURL }}" class="zs-link">All posts →</a></p>
</div>
{{ end }}
