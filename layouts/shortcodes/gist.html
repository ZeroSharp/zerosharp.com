{{/* {{< gist USER ID >}} or {{< gist USER ID FILENAME >}}
     Hugo retired its built-in gist shortcode in 0.156.0. This is a
     drop-in replacement using GitHub's official embed script. */}}
{{- $user := .Get 0 -}}
{{- $id   := .Get 1 -}}
{{- $file := .Get 2 -}}
<script src="https://gist.github.com/{{ $user }}/{{ $id }}.js{{ with $file }}?file={{ . }}{{ end }}"></script>
